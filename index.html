<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisitasPDV - Control de Puntos de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="app" class="min-h-screen"></div>
    
    <script>
        // App State
        let state = {
            dataLoaded: false,
            dataMemo: [
                {id: 187679, nombre: 'Juan David Narvaez Narvaez', prog: 5, ok: 0, warn: 1, fail: 4},
                {id: 185204, nombre: 'Liliana Paola Arteaga Berrio', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 186290, nombre: 'Alison Molina', prog: 8, ok: 1, warn: 7, fail: 0},
                {id: 144074, nombre: 'Yenny Carolina Forero Charry', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 187096, nombre: 'Andrea J. Santos Chacuto', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 187688, nombre: 'Brayan Felipe Gaitan', prog: 4, ok: 0, warn: 0, fail: 4},
                {id: 189763, nombre: 'Dalia Fernanda Ramirez Gonzalez', prog: 1, ok: 1, warn: 0, fail: 0},
                {id: 187309, nombre: 'Edwin Vargas Ramos', prog: 6, ok: 4, warn: 2, fail: 0},
                {id: 131743, nombre: 'Elis Johana Sierra Rico', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 173200, nombre: 'Erica Alexandra Tobar Leon', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 180667, nombre: 'Geraldin Navarro', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 189764, nombre: 'Karen Julieth Saenz Lagares', prog: 1, ok: 1, warn: 0, fail: 0},
                {id: 189148, nombre: 'Laura Valentina Torres', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 180734, nombre: 'Camila Garcia Piñeros', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 187661, nombre: 'Viviana Villamil Espitia', prog: 6, ok: 0, warn: 0, fail: 6},
                {id: 180321, nombre: 'Yeison Quintero Lopez', prog: 5, ok: 0, warn: 5, fail: 0}
            ]
        };

        function calcStats(data) {
            const total = data.reduce((a,c) => a + c.prog, 0);
            const ok = data.reduce((a,c) => a + c.ok, 0);
            const warn = data.reduce((a,c) => a + c.warn, 0);
            const fail = data.reduce((a,c) => a + c.fail, 0);
            const noReport = data.filter(d => d.prog === 0).length;
            return { total, ok, warn, fail, noReport };
        }

        function getStatus(d) {
            if (d.ok === d.prog) return 'Cumplió';
            if (d.fail > 0 || d.prog === 0) return 'No Reportó';
            return 'T. Insuf.';
        }

        function getStatusClass(s) {
            if (s === 'Cumplió') return 'bg-green-100 text-green-800';
            if (s === 'No Reportó') return 'bg-red-100 text-red-800';
            return 'bg-yellow-100 text-yellow-800';
        }

        function render() {
            const stats = calcStats(state.dataMemo);
            const pct = stats.total > 0 ? Math.round((stats.ok / stats.total) * 100) : 0;

            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="max-w-7xl mx-auto p-6">
                    <!-- Header -->
                    <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="bg-indigo-600 text-white p-3 rounded-lg">
                                    <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-2xl font-bold text-gray-900">VisitasPDV</h1>
                                    <p class="text-sm text-gray-500">Leidy Viviana Rodriguez Pedroza · 9 de marzo, 2026</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-3xl font-bold text-indigo-600">${pct}% cumplimiento</div>
                            </div>
                        </div>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white rounded-lg shadow-sm p-6">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">PROGRAMADAS</span>
                                <i data-lucide="calendar" class="w-4 h-4 text-gray-400"></i>
                            </div>
                            <div class="text-3xl font-bold text-gray-900">${stats.total}</div>
                            <div class="text-sm text-gray-500">16 asesores</div>
                        </div>
                        <div class="bg-white rounded-lg shadow-sm p-6">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">CUMPLIERON</span>
                                <i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i>
                            </div>
                            <div class="text-3xl font-bold text-gray-900">${stats.ok}</div>
                            <div class="text-sm text-gray-500">${pct}% del total</div>
                        </div>
                        <div class="bg-white rounded-lg shadow-sm p-6">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">T. INSUFICIENTE</span>
                                <i data-lucide="alert-triangle" class="w-4 h-4 text-yellow-500"></i>
                            </div>
                            <div class="text-3xl font-bold text-gray-900">${stats.warn}</div>
                            <div class="text-sm text-gray-500">Con advertencias</div>
                        </div>
                        <div class="bg-white rounded-lg shadow-sm p-6">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">NO REPORTARON</span>
                                <i data-lucide="x-circle" class="w-4 h-4 text-red-500"></i>
                            </div>
                            <div class="text-3xl font-bold text-gray-900">${stats.fail}</div>
                            <div class="text-sm text-gray-500">Sin registro SGI</div>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50 border-b">
                                    <tr>
                                        <th class="text-left py-3 px-4 font-semibold text-sm text-gray-700">ASESOR</th>
                                        <th class="text-center py-3 px-4 font-semibold text-sm text-gray-700">PROG.</th>
                                        <th class="text-center py-3 px-4 font-semibold text-sm text-gray-700">
                                            <i data-lucide="check" class="w-4 h-4 inline text-green-600"></i>
                                        </th>
                                        <th class="text-center py-3 px-4 font-semibold text-sm text-gray-700">
                                            <i data-lucide="alert-triangle" class="w-4 h-4 inline text-yellow-600"></i>
                                        </th>
                                        <th class="text-center py-3 px-4 font-semibold text-sm text-gray-700">
                                            <i data-lucide="x" class="w-4 h-4 inline text-red-600"></i>
                                        </th>
                                        <th class="text-left py-3 px-4 font-semibold text-sm text-gray-700">ESTADO</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y">
                                    ${state.dataMemo.map((d, i) => {
                                        const status = getStatus(d);
                                        const statusClass = getStatusClass(status);
                                        const initial = d.nombre.split(' ').map(n => n[0]).join('').substring(0,2);
                                        return `
                                            <tr class="hover:bg-gray-50">
                                                <td class="py-3 px-4">
                                                    <div class="flex items-center gap-3">
                                                        <div class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm font-semibold">
                                                            ${initial}
                                                        </div>
                                                        <span class="font-medium text-gray-900">${d.nombre}</span>
                                                    </div>
                                                </td>
                                                <td class="py-3 px-4 text-center text-gray-700">${d.prog}</td>
                                                <td class="py-3 px-4 text-center ${d.ok > 0 ? 'text-green-600 font-semibold' : 'text-gray-400'}">${d.ok}</td>
                                                <td class="py-3 px-4 text-center ${d.warn > 0 ? 'text-yellow-600 font-semibold' : 'text-gray-400'}">${d.warn}</td>
                                                <td class="py-3 px-4 text-center ${d.fail > 0 ? 'text-red-600 font-semibold' : 'text-gray-400'}">${d.fail}</td>
                                                <td class="py-3 px-4">
                                                    <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium ${statusClass}">
                                                        ${status === 'Cumplió' ? '<i data-lucide="check-circle" class="w-3 h-3"></i>' : ''}
                                                        ${status === 'No Reportó' ? '<i data-lucide="x-circle" class="w-3 h-3"></i>' : ''}
                                                        ${status === 'T. Insuf.' ? '<i data-lucide="alert-triangle" class="w-3 h-3"></i>' : ''}
                                                        ${status}
                                                    </span>
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Init
        render();
    </script>
</body>
</html>
