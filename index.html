<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisitasPDV - Control de Puntos de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="app" class="min-h-screen"></div>

    <script>
        // App State
        let state = {
            dataLoaded: false,
            dataDemo: [
                {id: 187679, nombre: 'Juan David Narvaez Narvaez', prog: 5, ok: 0, warn: 1, fail: 4},
                {id: 185204, nombre: 'Liliana Paola Arteaga Berrio', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 186290, nombre: 'Alison Molina', prog: 8, ok: 1, warn: 7, fail: 0},
                {id: 144074, nombre: 'Yenny Carolina Forero Charry', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 187096, nombre: 'Andrea J. Santos Chacuto', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 187686, nombre: 'Brayan Felipe Gaitan', prog: 4, ok: 0, warn: 0, fail: 4},
                {id: 189763, nombre: 'Dalia Fernanda Ramirez Gonzalez', prog: 1, ok: 1, warn: 0, fail: 0},
                {id: 187309, nombre: 'Edwin Vargas Ramos', prog: 6, ok: 4, warn: 2, fail: 0},
                {id: 131743, nombre: 'Elis Johana Sierra Rico', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 173290, nombre: 'Erica Alexandra Tobar Leon', prog: 1, ok: 0, warn: 1, fail: 0},
                {id: 189667, nombre: 'Geraldin Navarro', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 189764, nombre: 'Karen Julieth Saenz Lagares', prog: 1, ok: 1, warn: 0, fail: 0},
                {id: 189148, nombre: 'Laura Valentina Torres', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 189734, nombre: 'Camila Garcia Piñeros', prog: 1, ok: 0, warn: 0, fail: 1},
                {id: 187681, nombre: 'Viviana Villamil Espitia', prog: 6, ok: 0, warn: 0, fail: 6},
                {id: 189321, nombre: 'Yeison Quintero Lopez', prog: 5, ok: 0, warn: 5, fail: 0}
            ],
            currentDate: '9 de marzo, 2026',
            supervisor: 'Leidy Viviana Rodriguez Pedroza'
        };

        // Render Functions
        function render() {
            document.getElementById('app').innerHTML = state.dataLoaded ? renderDashboard() : renderUpload();
        }

        function renderUpload() {
            return `
            <div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                <div class="w-full max-w-md space-y-6">
                    <div class="text-center space-y-2">
                        <div class="inline-flex items-center gap-2 bg-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-full">
                            📍 VisitasPDV Control de Equipos
                        </div>
                        <h1 class="text-2xl font-black text-slate-900">Valida el reporte del día</h1>
                        <p class="text-sm text-slate-500">Carga los archivos y cruzamos visitas programadas vs ejecutadas al instante</p>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-4">
                        <button onclick="loadDemoData()" class="w-full h-11 rounded-xl bg-indigo-600 hover:bg-indigo-700 font-semibold text-white">
                            ⚡ Ver demo datos reales del 9 de marzo
                        </button>
                        <p class="text-center text-xs text-slate-400">
                            Los datos se procesan localmente<br>Nada se envía a servidores externos
                        </p>
                    </div>
                </div>
            </div>
            `;
        }

        function renderDashboard() {
            const total = state.dataDemo.length;
            const cumplieron = state.dataDemo.filter(a => a.ok > 0 && a.warn === 0 && a.fail === 0).length;
            const pct = Math.round((cumplieron / total) * 100);

            return `
            <div class="flex flex-col min-h-screen">
                <!-- Header -->
                <header class="sticky top-0 z-30 h-14 flex items-center justify-between px-4 border-b shadow-sm bg-white">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-sm">V</div>
                        <div>
                            <span class="font-bold text-sm">VisitasPDV</span>
                            <span class="text-xs ml-2 text-slate-500">${state.currentDate}</span>
                        </div>
                    </div>
                    <button onclick="reload()" class="text-xs font-semibold border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50">
                        ↻ Reiniciar
                    </button>
                </header>

                <!-- Main Content -->
                <main class="flex-1 overflow-y-auto p-4 md:p-6 pt-6 space-y-5">
                    <!-- Supervisor Info -->
                    <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-xs px-4 py-2.5 rounded-xl border bg-white">
                        <span class="font-semibold text-indigo-600">${state.supervisor}</span>
                        <span class="text-slate-500">•</span>
                        <span class="text-slate-500">${state.currentDate}</span>
                        <span class="ml-auto font-black text-slate-500">${pct}% cumplimiento</span>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                        ${renderStatCard('Programadas', total, `${total} asesores`, '📋', 'indigo')}
                        ${renderStatCard('Cumplieron', cumplieron, `${pct}% del total`, '✅', 'emerald')}
                        ${renderStatCard('T. Insuficiente', state.dataDemo.filter(a => a.warn > 0).length, 'Con advertencias', '⚠️', 'amber')}
                        ${renderStatCard('No Reportaron', state.dataDemo.filter(a => a.fail > 0).length, 'Sin registro SGI', '❌', 'red')}
                    </div>

                    <!-- Table -->
                    <div class="rounded-xl border overflow-hidden bg-white">
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="text-xs font-semibold uppercase tracking-wide border-b bg-slate-50">
                                        <th class="px-5 py-3 text-left">Asesor</th>
                                        <th class="px-4 py-3 text-center">Prog.</th>
                                        <th class="px-4 py-3 text-center text-emerald-600">✓</th>
                                        <th class="px-4 py-3 text-center text-amber-500">⚠</th>
                                        <th class="px-4 py-3 text-center text-red-500">✗</th>
                                        <th class="px-5 py-3 text-left">Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${state.dataDemo.map((a, i) => `
                                        <tr class="border-b hover:bg-slate-50">
                                            <td class="px-5 py-3.5">
                                                <div class="flex items-center gap-2.5">
                                                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-black text-white shrink-0 bg-indigo-600">
                                                        ${a.nombre.split(' ')[0][0]}${a.nombre.split(' ')[1] ? a.nombre.split(' ')[1][0] : ''}
                                                    </div>
                                                    <span class="font-medium">${a.nombre}</span>
                                                </div>
                                            </td>
                                            <td class="px-4 py-3.5 text-center tabular-nums">${a.prog}</td>
                                            <td class="px-4 py-3.5 text-center tabular-nums text-emerald-600 font-semibold">${a.ok}</td>
                                            <td class="px-4 py-3.5 text-center tabular-nums text-amber-500 font-semibold">${a.warn}</td>
                                            <td class="px-4 py-3.5 text-center tabular-nums text-red-500 font-semibold">${a.fail}</td>
                                            <td class="px-5 py-3.5">${renderBadge(a)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            </div>
            `;
        }

        function renderStatCard(label, val, note, emoji, color) {
            const colors = {
                indigo: 'bg-indigo-100 text-indigo-600 border-indigo-200',
                emerald: 'bg-emerald-100 text-emerald-600 border-emerald-200',
                amber: 'bg-amber-100 text-amber-600 border-amber-200',
                red: 'bg-red-100 text-red-600 border-red-200'
            };
            return `
            <div class="rounded-xl border p-4 shadow-sm bg-white">
                <div class="flex items-start justify-between mb-3">
                    <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">${label}</span>
                    <div class="w-7 h-7 rounded-lg flex items-center justify-center text-sm ${colors[color]}">${emoji}</div>
                </div>
                <div class="text-3xl font-black tabular-nums">${val}</div>
                <div class="text-xs mt-1.5 text-slate-500">${note}</div>
            </div>
            `;
        }

        function renderBadge(asesor) {
            if (asesor.ok > 0 && asesor.warn === 0 && asesor.fail === 0) {
                return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold border text-emerald-700 bg-emerald-50 border-emerald-200">✅ Cumplió</span>';
            } else if (asesor.fail > 0) {
                return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold border text-red-700 bg-red-50 border-red-200">❌ No Reportó</span>';
            } else {
                return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold border text-amber-700 bg-amber-50 border-amber-200">⚠️ T. Insuf.</span>';
            }
        }

        // Actions
        function loadDemoData() {
            state.dataLoaded = true;
            render();
        }

        function reload() {
            state.dataLoaded = false;
            render();
        }

        // Init
        render();
    </script>
</body>
</html>
